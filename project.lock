preprocess_ddt:
  cmd: python -m weasel run preprocess_ddt
  script:
    - mkdir -p assets/da_ddt
    - mkdir -p corpus/da_ddt
    - python -m spacy convert assets/UD_Danish-DDT/da_ddt-ud-train.conllu  corpus/da_ddt/  --converter
      conllu  --merge-subtokens
    - python -m spacy convert  assets/UD_Danish-DDT/da_ddt-ud-dev.conllu  corpus/da_ddt/  --converter
      conllu  --merge-subtokens
    - python -m spacy convert  assets/UD_Danish-DDT/da_ddt-ud-test.conllu corpus/da_ddt/
      --converter conllu  --merge-subtokens
    - mv corpus/da_ddt/da_ddt-ud-train.spacy corpus/da_ddt/train.spacy
    - mv corpus/da_ddt/da_ddt-ud-dev.spacy corpus/da_ddt/dev.spacy
    - mv corpus/da_ddt/da_ddt-ud-test.spacy corpus/da_ddt/test.spacy
    - cp assets/UD_Danish-DDT/da_ddt-ud-train.conllu assets/da_ddt/train.conllu
    - cp assets/UD_Danish-DDT/da_ddt-ud-dev.conllu assets/da_ddt/dev.conllu
    - cp assets/UD_Danish-DDT/da_ddt-ud-test.conllu assets/da_ddt/test.conllu
  deps:
    - path: assets/UD_Danish-DDT/da_ddt-ud-train.conllu
      md5: c80b9a9eb7677ea3dc56ae87056b5454
    - path: assets/UD_Danish-DDT/da_ddt-ud-dev.conllu
      md5: 1feb5aa4179b831f1d01e827edcc3a30
